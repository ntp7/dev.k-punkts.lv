<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homepage</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: 'Oswald', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
}
header {
    width: 100%;
    padding: 20px;
    box-sizing: border-box;
}
.logo {
    width: 50px;
}
.hero {
    text-align: center;
    margin-top: 60px;
    margin-bottom: 50px;
}
.hero h1 {
    font-size: 3em;
    margin-bottom: 10px;
}
.hero p {
    color: #bbb;
    font-family: sans-serif;
    font-weight: 400;
    max-width: 400px;
    margin: 0 auto;
}
.buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 380px;
    padding: 0 20px;
    box-sizing: border-box;
}
/* LIVE BUTTON — dominant center */
.live-wrapper {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin: 12px 0;
}
.live-dot {
    position: absolute;
    left: 0;
    width: 10px;
    height: 10px;
    background: red;
    border-radius: 50%;
    animation: blink 1s infinite;
}
@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}
.live-button {
    width: 100%;
    padding: 20px;
    font-family: 'Oswald', sans-serif;
    font-size: 1.5em;
    background: #1a1a1a;
    color: white;
    border: 2px solid #444;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: 0.3s;
}
.live-button:hover {
    border-color: #666;
    background: #222;
}
/* SECONDARY BUTTONS — side by side below */
.secondary-buttons {
    display: flex;
    gap: 12px;
    width: 100%;
    margin-top: 4px;
}
.button {
    flex: 1;
    padding: 14px 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 1em;
    border: none;
    border-radius: 8px;
    background: #222;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
.button:hover {
    filter: brightness(1.3);
}
.button-green {
    background: linear-gradient(to right, #48c977, #1e4922);
}
.button-cyan {
    background: #0cf;
    color: black;
}
footer {
    margin-top: 80px;
    color: #777;
    font-size: 0.9em;
}
@media (min-width: 768px) {
    .hero h1 { font-size: 4em; }
    .buttons { max-width: 460px; }
}
</style>
<script>
function goTo(page) { window.location.href = page; }
</script>
</head>
<body>
<header>
    <a href="home.html"><img src="logo.png" class="logo"></a>
</header>
<section class="hero">
    <h1>dev.k-punkts.lv</h1>
    <p>Rīki pasākumu organizēšanai</p>
</section>
<div class="buttons">
    <div class="live-wrapper">
        <span class="live-dot" style="padding-left: 20px; padding-top: 20px;"></span>
        <button class="live-button" onclick="goTo('index.html')">Live atzīmēšana</button>
    </div>
    <div class="secondary-buttons">
        <button class="button button-green" onclick="goTo('k100dprivate2026.html')">K-100 2026 dati</button>
        <button class="button button-cyan" onclick="goTo('arhivs.html')">Arhīvs</button>
    </div>
</div>
</body>
</html>
