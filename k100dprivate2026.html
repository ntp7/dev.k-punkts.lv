<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 0;
            margin: 0;
        }

        h1 {
            background: linear-gradient(to right, #48c977, #1e4922);
            color: white;
            padding: 10px 20px;
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        h1 img {
            height: 50px;
            width: auto;
        }

        .header-content {
            display: flex;
            align-items: center;
            flex-grow: 1;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-collumn {
            display: grid;
            grid-template-columns: max-content max-content;
            row-gap: 5px;
            column-gap: 15px;
            font-size: 14px;
            margin-left: 10px;
            align-items: center;
        }

        /* TABLE WRAPPER */
        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
            text-align: left;
            min-width: 900px; /* ensures structure but allows scroll */
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        input[type="checkbox"] {
            cursor: pointer;
        }

        /* MOBILE IMPROVEMENTS */
        @media (max-width: 768px) {
            table {
                font-size: 13px;
            }

            th, td {
                padding: 6px;
            }

            h1 {
                font-size: 18px;
            }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.1.3/firebase-analytics.js";

        import firebaseConfig from './firebaseconfig.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.querySelector('#participants-table tbody');

            let totalParticipants = 0;
            let participants50km = 0;
            let participants100km = 0;
            let totalEur = 0;
            let totalWomen = 0;
            let totalMen = 0;

            try {
                const q = query(collection(db, 'pieteikums100km2026'), orderBy('submissionTime'));
                const querySnapshot = await getDocs(q);
                let index = 1;

                querySnapshot.forEach((docSnapshot) => {
                    const data = docSnapshot.data();
                    if (data.hide) return;

                    const row = document.createElement('tr');

                    row.innerHTML = `
                        <td>${index++}</td>
                        <td>${data.vards}</td>
                        <td>${data.uzvards}</td>
                        <td>${data.dzimums}</td>
                        <td>${data.epasts}</td>
                        <td>${data.telefons}</td>
                        <td>${data.birthday}</td>
                        <td>${data.country}</td>
                        <td>${data.ediens}</td>
                        <td>${data.ediens2}</td>
                        <td>${data.gultasvieta}</td>
                        <td>${data.distance}</td>
                        <td>${data.sekot}</td>
                        <td>${data.atlaide}</td>
                        <td>${data.komentars}</td>
                        <td>${data.news}</td>
                        <td>${new Date(data.submissionTime).toLocaleString()}</td>
                        <td style="text-align:center">${data.samaksa}</td>
                    `;

                    totalParticipants++;
                    totalEur += data.samaksa;

                    if (data.dzimums === "virietis") totalMen++;
                    if (data.dzimums === "sieviete") totalWomen++;

                    if (data.distance === "50km") participants50km++;
                    if (data.distance === "100km") participants100km++;

                    tableBody.appendChild(row);
                });

                document.getElementById('value0').textContent = totalParticipants;
                document.getElementById('value1').textContent = participants50km;
                document.getElementById('value1b').textContent = participants100km;
                document.getElementById('value2').textContent = totalEur;
                document.getElementById('value3').textContent = totalWomen;
                document.getElementById('value4').textContent = totalMen;

            } catch (error) {
                console.error("Error getting documents:", error);
            }
        });
    </script>
</head>

<body>

<h1>
    <div class="header-content">
        <span>
            Dalībnieku saraksts 
            <span style="font-size: 18px; color: rgb(202,255,159); padding-left: 15px;">
                K-100 2026
            </span>
        </span>

        <div class="header-collumn">
            <div>Dalībnieku skaits kopā:</div><div id="value0"></div>
        </div>

        <div class="header-collumn" style="display:flex; flex-direction:column; gap:10px;">
            <div style="display:grid; grid-template-columns:max-content max-content; gap:20px;">
                <div>50km:</div><div id="value1"></div>
            </div>
            <div style="display:grid; grid-template-columns:max-content max-content; gap:20px;">
                <div>100km:</div><div id="value1b"></div>
            </div>
        </div>

        <div class="header-collumn">
            <div>Kopā EUR:</div><div id="value2"></div>
        </div>

        <div class="header-collumn">
            <div>Sievietes:</div><div id="value3"></div>
            <div>Vīrieši:</div><div id="value4"></div>
        </div>
    </div>

    <img src="logo.png" alt="Logo">
</h1>

<div class="table-container">
    <table id="participants-table">
        <thead>
            <tr>
                <th>Nr.</th>
                <th>Vārds</th>
                <th>Uzvārds</th>
                <th>Dzimums</th>
                <th>Epasts</th>
                <th>Telefons</th>
                <th>Dzimšanas diena</th>
                <th>Valsts</th>
                <th>Ēdiens</th>
                <th>Ēdiens2</th>
                <th>Gultasvieta</th>
                <th>Distance</th>
                <th>Sekot</th>
                <th>Atlaide</th>
                <th>Komentārs</th>
                <th>News</th>
                <th>Reģistrācijas laiks</th>
                <th>Samaksa</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

</body>
</html>
